<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Portal - Reels Mode</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #000; color: #fff; overflow: hidden; }
        
        /* ഫുൾ സ്ക്രീൻ സ്ക്രോളിംഗ് സെറ്റപ്പ് */
        #student-panel { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; /* റീൽസ് പോലെ കൃത്യമായി ലോക്ക് ആകാൻ */
            scrollbar-width: none; 
        }
        #student-panel::-webkit-scrollbar { display: none; }
        
        .reel-container { 
            width: 100%; 
            height: 100vh; 
            scroll-snap-align: start; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000; 
            position: relative;
        }
        
        /* വീഡിയോ ഇരിക്കുന്ന ബോക്സ് (മൊബൈൽ റീൽസ് സൈസ്) */
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 430px; /* ഇൻസ്റ്റാഗ്രാം റീലിന്റെ കൃത്യമായ വീതി */
            height: 92vh; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.9); 
            background: #111;
        }
        
        /* യൂട്യൂബ് ആണെങ്കിൽ വീതി കുറച്ചുകൂടി കൂട്ടാൻ (ഓപ്ഷണൽ - ഭംഗിക്ക് വേണ്ടി) */
        .video-wrapper.yt-layout {
            max-width: 800px; /* യൂട്യൂബ് വീഡിയോകൾ ലാപ്ടോപ്പിൽ കാണുമ്പോൾ കട്ട് ആകാതിരിക്കാൻ */
            aspect-ratio: 16/9;
            height: auto;
        }

        /* മൊബൈലിൽ ആണെങ്കിൽ യൂട്യൂബും റീൽസ് സൈസിൽ തന്നെ കാണിക്കും */
        @media (max-width: 768px) {
            .video-wrapper.yt-layout {
                max-width: 100%;
                height: 92vh;
                aspect-ratio: auto;
            }
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        /* സുരക്ഷാ കവചങ്ങൾ (ക്ലിക്ക് ബ്ലോക്കറുകൾ) */
        .insta-blocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,0); }
        .yt-blocker { position: absolute; top: 0; left: 0; width: 100%; height: 60px; z-index: 10; background: rgba(0,0,0,0); }
        .yt-blocker-logo { position: absolute; bottom: 0; right: 0; width: 100px; height: 50px; z-index: 10; background: rgba(0,0,0,0); }

        /* താഴെയുള്ള സൂചന മെസ്സേജ് */
        .swipe-hint { 
            position: absolute; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.6); 
            padding: 6px 16px; 
            border-radius: 20px; 
            font-size: 12px; 
            color: #ccc; 
            z-index: 20; 
            pointer-events: none; 
            letter-spacing: 0.5px;
        }
        
        .loading { text-align: center; padding: 20px; color: #888; font-size: 18px; width: 100%; margin-top: 45vh;}
    </style>
</head>
<body>

    <div id="student-panel">
        <div id="reels-wrapper">
            <div class="loading">വീഡിയോകൾ തയ്യാറാക്കുന്നു...</div>
        </div>
    </div>

    <script>
        // ലിസ്റ്റുകൾ റാൻഡം ആയി കാണിക്കാൻ
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadReelsPortal() {
            let wrapper = document.getElementById('reels-wrapper');
            try {
                // അഡ്മിൻ പാനൽ വഴി അപ്ഡേറ്റ് ചെയ്ത videos.json ഫയൽ എടുക്കുന്നു
                let res = await fetch('videos.json');
                if(!res.ok) throw new Error();
                let videoData = await res.json();
                
                if (videoData.length === 0) {
                    wrapper.innerHTML = '<div class="reel-container"><p style="color:#888;">പഠന വീഡിയോകൾ ഒന്നും ലഭ്യമല്ല!</p></div>';
                    return;
                }

                wrapper.innerHTML = '';
                // വീഡിയോകൾ മിക്സ് ചെയ്ത് റാൻഡം ഓർഡറിലാക്കുന്നു
                let randomVideos = shuffleArray(videoData);

                randomVideos.forEach(item => {
                    let videoElement = "";
                    let customClass = "video-wrapper";

                    if (item.type === 'youtube') {
                        customClass = "video-wrapper yt-layout"; // യൂട്യൂബിന് അനുയോജ്യമായ ലേഔട്ട്
                        videoElement = `
                            <div class="yt-blocker"></div>
                            <div class="yt-blocker-logo"></div>
                            <iframe src="${item.url}&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        `;
                    } else if (item.type === 'instagram') {
                        let finalInstaUrl = item.url + '?autoplay=1&muted=1';
                        videoElement = `
                            <div class="insta-blocker"></div>
                            <iframe src="${finalInstaUrl}" scrolling="no" allowtransparency="true" allow="autoplay"></iframe>
                        `;
                    }

                    wrapper.innerHTML += `
                        <div class="reel-container">
                            <div class="${customClass}">
                                ${videoElement}
                                <div class="swipe-hint">അടുത്ത വീഡിയോയ്ക്ക് താഴേക്ക് സ്ക്രോൾ ചെയ്യുക ⬇️</div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                wrapper.innerHTML = '<div class="reel-container"><p style="color:#888;">ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല.</p></div>';
            }
        }

        loadReelsPortal();
    </script>
</body>
</html>
